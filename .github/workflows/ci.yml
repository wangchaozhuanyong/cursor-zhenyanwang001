# 推送 / PR 时跑构建与类型检查（无需数据库），减少「推上去才发现挂」的情况。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: click-send-shop-main/click-send-shop-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: click-send-shop-main/click-send-shop-main/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          VITE_API_BASE_URL: /api

  server-typecheck:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
