name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-history:
    name: Main history guard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject non-fast-forward main updates
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          zero="0000000000000000000000000000000000000000"
          if [ "$before" = "$zero" ]; then
            echo "New branch push; no previous commit to compare."
            exit 0
          fi
          if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            echo "::error::Cannot verify previous main commit $before. Refusing deploy until history is checked."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$before" "$after"; then
            echo "::error::Non-fast-forward update detected on main. Push a new revert/fix commit instead of moving main backward."
            exit 1
          fi
          echo "Main history is fast-forward."

  repo-hygiene:
    name: Repo hygiene (tracked artifacts + secrets + static security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: node server/scripts/check-tracked-artifacts.js
      - run: node scripts/check-secret-leaks.mjs
      - run: node scripts/check-static-security.mjs

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: click-send-shop-main/click-send-shop-main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: click-send-shop-main/click-send-shop-main/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run check:text
      - run: npm run typecheck
      - run: npm run typecheck:strict-api
      - run: npm run typecheck:strict-admin
      - run: npm run build:admin
        env:
          VITE_API_BASE_URL: /api
      - run: npm run build
        env:
          VITE_API_BASE_URL: /api
      - run: npm run verify:pwa

  server-typecheck:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run arch:check
      - run: npm run check:no-new-ts-nocheck
      - run: npm run check:migrations
      - run: npm run check:report-registry
      - run: npm run typecheck
      - run: npm run test:unit
        env:
          NODE_ENV: test
      - run: npm run test:reports
        env:
          NODE_ENV: test
      - run: npm run test:report-contract
        env:
          NODE_ENV: test
      - run: npm run test:report-export
        env:
          NODE_ENV: test

  frontend-unit:
    name: Frontend (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: click-send-shop-main/click-send-shop-main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: click-send-shop-main/click-send-shop-main/package-lock.json
      - run: npm ci
      - run: npm run test
