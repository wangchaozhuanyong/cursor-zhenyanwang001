name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo hygiene (tracked artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: node server/scripts/check-tracked-artifacts.js

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: click-send-shop-main/click-send-shop-main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: click-send-shop-main/click-send-shop-main/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check:mojibake
      - run: npm run check:admin-i18n
      - run: npm run check:api-paths
      - run: npm run typecheck
      - run: npm run typecheck:strict-api
      - run: npm run typecheck:strict-admin
      - run: npm run build:admin
        env:
          VITE_API_BASE_URL: /api
      - run: npm run build
        env:
          VITE_API_BASE_URL: /api

  server-typecheck:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run arch:check
      - run: npm run check:migrations
      - run: npm run check:report-registry
      - run: npm run typecheck
      - run: npm run test:unit
        env:
          NODE_ENV: test
      - run: npm run test:reports
        env:
          NODE_ENV: test
      - run: npm run test:report-contract
        env:
          NODE_ENV: test
      - run: npm run test:report-export
        env:
          NODE_ENV: test

  frontend-unit:
    name: Frontend (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: click-send-shop-main/click-send-shop-main
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: click-send-shop-main/click-send-shop-main/package-lock.json
      - run: npm ci
      - run: npm run test
