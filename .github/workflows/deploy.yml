name: Deploy gc-api (CI/CD)

# Auto deploy only after CI succeeds. Manual dispatch can deploy the selected
# workflow ref, or an explicitly supplied branch/SHA pair.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch name to deploy. Empty = selected workflow branch"
        required: false
        default: ""
      deploy_sha:
        description: "Exact commit SHA to deploy. Empty = branch tip"
        required: false
        default: ""
      auto_rollback:
        description: "Auto rollback on deploy failure (1=enabled)"
        required: false
        default: "0"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  gate:
    name: Require CI success (auto deploy only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Deploy gate passed."

  check-secrets:
    name: Validate deploy secrets
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Ensure DEPLOY_* secrets are non-empty
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }
          [ -n "${DEPLOY_HOST:-}" ] || fail "DEPLOY_HOST is empty"
          [ -n "${DEPLOY_USER:-}" ] || fail "DEPLOY_USER is empty"
          [ -n "${DEPLOY_SSH_KEY:-}" ] || fail "DEPLOY_SSH_KEY is empty"
          [ -n "${DEPLOY_PROJECT_DIR:-}" ] || fail "DEPLOY_PROJECT_DIR is empty"
          echo "OK: deploy secrets are present."

  deploy:
    name: SSH deploy via ci-deploy.sh
    needs: check-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AUTO_ROLLBACK: ${{ github.event.inputs.auto_rollback || '0' }}
      DEPLOY_TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || github.event.inputs.deploy_ref || github.ref_name }}
      DEPLOY_TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.event.inputs.deploy_sha || '' }}
      BUILD_FRONTEND_ON_SERVER: "1"
      BACKUP_BEFORE_DEPLOY: "1"

    steps:
      - name: Show context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          echo "AUTO_ROLLBACK=${AUTO_ROLLBACK}"
          echo "DEPLOY_TARGET_BRANCH=${DEPLOY_TARGET_BRANCH}"
          echo "DEPLOY_TARGET_SHA=${DEPLOY_TARGET_SHA}"
          echo "BUILD_FRONTEND_ON_SERVER=${BUILD_FRONTEND_ON_SERVER}"

      - name: Deploy via SSH (ci-deploy.sh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 20m
          script_stop: true
          envs: AUTO_ROLLBACK,DEPLOY_TARGET_BRANCH,DEPLOY_TARGET_SHA,BUILD_FRONTEND_ON_SERVER,BACKUP_BEFORE_DEPLOY
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PROJECT_DIR }}"
            export PROJECT_DIR="${{ secrets.DEPLOY_PROJECT_DIR }}"
            export PM2_APP="${{ secrets.DEPLOY_PM2_APP || 'gc-api' }}"
            export GIT_BRANCH="${DEPLOY_TARGET_BRANCH:-main}"
            export GIT_COMMIT="${DEPLOY_TARGET_SHA:-}"
            export AUTO_ROLLBACK="${AUTO_ROLLBACK:-0}"
            export BUILD_FRONTEND_ON_SERVER="${BUILD_FRONTEND_ON_SERVER:-1}"
            export BACKUP_BEFORE_DEPLOY="${BACKUP_BEFORE_DEPLOY:-1}"
            echo "Deploy target branch=${GIT_BRANCH} commit=${GIT_COMMIT}"
            bash deploy/ci-deploy.sh

      - name: On failure, fetch remote logs (best-effort)
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: false
          script: |
            set +e
            cd "${{ secrets.DEPLOY_PROJECT_DIR }}"
            echo "----- pm2 list -----"
            pm2 list || true
            echo "----- pm2 show ${{ secrets.DEPLOY_PM2_APP || 'gc-api' }} -----"
            pm2 show "${{ secrets.DEPLOY_PM2_APP || 'gc-api' }}" || true
            echo "----- pm2 logs (last 200) -----"
            pm2 logs "${{ secrets.DEPLOY_PM2_APP || 'gc-api' }}" --lines 200 --nostream || true
            echo "----- tail deploy.log -----"
            tail -n 200 "${{ secrets.DEPLOY_PROJECT_DIR }}/deploy.log" || true
            echo "----- .deploy-state/history.log -----"
            tail -n 50 "${{ secrets.DEPLOY_PROJECT_DIR }}/.deploy-state/history.log" || true
