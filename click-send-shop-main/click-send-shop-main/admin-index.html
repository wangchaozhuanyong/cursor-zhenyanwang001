<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content" />
    <title>管理后台</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" sizes="192x192" href="/api/pwa/icon-192x192.png" />
    <link rel="shortcut icon" type="image/png" href="/api/pwa/icon-192x192.png" />
    <script>
      (function () {
        try {
          var key = "site:brand:favicon";
          var raw = window.localStorage && window.localStorage.getItem(key);
          if (!raw) return;
          var payload = JSON.parse(raw);
          var href = typeof payload.href === "string" ? payload.href.trim() : "";
          var savedAt = Number(payload.savedAt || 0);
          var maxAge = 7 * 24 * 60 * 60 * 1000;
          if (!href || !savedAt || Date.now() - savedAt > maxAge) {
            window.localStorage.removeItem(key);
            return;
          }
          document
            .querySelectorAll("link[rel='icon'], link[rel='shortcut icon'], link[rel='apple-touch-icon']")
            .forEach(function (el) {
              el.parentNode && el.parentNode.removeChild(el);
            });
          [
            { rel: "icon", href: href },
            { rel: "shortcut icon", href: href },
          ].forEach(function (item) {
            var link = document.createElement("link");
            link.rel = item.rel;
            link.href = item.href;
            document.head.appendChild(link);
          });
        } catch (_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/browser-preboot.js"></script>
    <script type="module">
      try {
        if (typeof import.meta.resolve !== "function") {
          import.meta.resolve = (specifier) => specifier;
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/admin-main.tsx"></script>
  </body>
</html>
