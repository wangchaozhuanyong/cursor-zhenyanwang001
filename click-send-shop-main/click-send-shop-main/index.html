<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content" />

    <meta name="description" content="大马通是马来西亚华人一站式生活服务与优选商城。" />
    <meta name="author" content="大马通" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="大马通" />
    <meta name="application-name" content="大马通" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="大马通" />
    <meta property="og:description" content="大马通是马来西亚华人一站式生活服务与优选商城。" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="大马通" />
    <meta name="twitter:description" content="大马通是马来西亚华人一站式生活服务与优选商城。" />

    <!-- 浏览器标签优先使用后台配置的动态透明 favicon；PWA 安装图标同样由后端按品牌动态生成。 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/api/pwa/icon-192x192.png" />
    <link rel="shortcut icon" type="image/png" href="/api/pwa/icon-192x192.png" />
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      (function () {
        try {
          var key = "site:brand:favicon";
          var raw = window.localStorage && window.localStorage.getItem(key);
          if (!raw) return;
          var payload = JSON.parse(raw);
          var href = typeof payload.href === "string" ? payload.href.trim() : "";
          var savedAt = Number(payload.savedAt || 0);
          var maxAge = 7 * 24 * 60 * 60 * 1000;
          if (!href || !savedAt || Date.now() - savedAt > maxAge) {
            window.localStorage.removeItem(key);
            return;
          }
          document
            .querySelectorAll("link[rel='icon'], link[rel='shortcut icon'], link[rel='apple-touch-icon']")
            .forEach(function (el) {
              el.parentNode && el.parentNode.removeChild(el);
            });
          [
            { rel: "icon", href: href },
            { rel: "shortcut icon", href: href },
            { rel: "apple-touch-icon", href: href },
          ].forEach(function (item) {
            var link = document.createElement("link");
            link.rel = item.rel;
            link.href = item.href;
            document.head.appendChild(link);
          });
        } catch (_e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      .preboot-shell {
        min-height: 100dvh;
        background: #f9fafb;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }
      .preboot-topbar {
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid #e5e7eb;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
      }
      .preboot-topbar-inner,
      .preboot-main {
        box-sizing: border-box;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .preboot-topbar-inner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
      .preboot-main {
        padding-top: 1.25rem;
        padding-bottom: 5rem;
      }
      .preboot-skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: #eceff3;
      }
      .preboot-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
        animation: preboot-shimmer 1.25s infinite;
      }
      .preboot-logo,
      .preboot-action {
        width: 2.25rem;
        height: 2.25rem;
        flex: 0 0 auto;
      }
      .preboot-search {
        height: 2.25rem;
        flex: 1 1 auto;
      }
      .preboot-hero {
        height: min(42vh, 20rem);
        border-radius: 1rem;
      }
      .preboot-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .preboot-card {
        height: 9rem;
        border-radius: 1rem;
      }
      @keyframes preboot-shimmer {
        to {
          transform: translateX(100%);
        }
      }
      @media (min-width: 768px) {
        .preboot-topbar-inner,
        .preboot-main {
          padding-left: 1.5rem;
          padding-right: 1.5rem;
        }
        .preboot-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preboot-shell" aria-busy="true" aria-label="页面加载中">
        <div class="preboot-topbar">
          <div class="preboot-topbar-inner">
            <div class="preboot-skeleton preboot-logo"></div>
            <div class="preboot-skeleton preboot-search"></div>
            <div class="preboot-skeleton preboot-action"></div>
          </div>
        </div>
        <main class="preboot-main">
          <div class="preboot-skeleton preboot-hero"></div>
          <div class="preboot-grid">
            <div class="preboot-skeleton preboot-card"></div>
            <div class="preboot-skeleton preboot-card"></div>
            <div class="preboot-skeleton preboot-card"></div>
            <div class="preboot-skeleton preboot-card"></div>
          </div>
        </main>
      </div>
    </div>
    <script src="/browser-preboot.js"></script>
    <script type="module">
      try {
        if (typeof import.meta.resolve !== "function") {
          import.meta.resolve = (specifier) => specifier;
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
