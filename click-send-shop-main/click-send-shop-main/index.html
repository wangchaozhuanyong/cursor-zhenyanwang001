<!doctype html>
<html lang="zh-CN" data-app-scope="store" data-preboot-layout="home">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no,email=no,address=no,date=no" />

    <meta name="author" content="大马通" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="大马通" />
    <meta name="application-name" content="大马通" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:type" content="website" />

    <!-- 浏览器标签优先使用后台配置的动态透明 favicon；PWA 安装图标同样由后端按品牌动态生成。 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/api/pwa/icon-192x192.png" />
    <link rel="shortcut icon" type="image/png" href="/api/pwa/icon-192x192.png" />
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      (function () {
        try {
          var key = "site:brand:favicon";
          var raw = window.localStorage && window.localStorage.getItem(key);
          if (!raw) return;
          var payload = JSON.parse(raw);
          var href = typeof payload.href === "string" ? payload.href.trim() : "";
          var savedAt = Number(payload.savedAt || 0);
          var maxAge = 7 * 24 * 60 * 60 * 1000;
          if (!href || !savedAt || Date.now() - savedAt > maxAge) {
            window.localStorage.removeItem(key);
            return;
          }
          document
            .querySelectorAll("link[rel='icon'], link[rel='shortcut icon'], link[rel='apple-touch-icon']")
            .forEach(function (el) {
              el.parentNode && el.parentNode.removeChild(el);
            });
          [
            { rel: "icon", href: href },
            { rel: "shortcut icon", href: href },
            { rel: "apple-touch-icon", href: href },
          ].forEach(function (item) {
            var link = document.createElement("link");
            link.rel = item.rel;
            link.href = item.href;
            document.head.appendChild(link);
          });
        } catch (_e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var pathname = window.location.pathname.replace(/\/+$/, "") || "/";
          var isHome = pathname === "/" || pathname === "/zh" || pathname === "/en";
          document.documentElement.setAttribute("data-preboot-layout", isHome ? "home" : "page");
        } catch (_e) {}
      })();
    </script>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
      }
      body {
        background: #fffaf2;
      }
      #root {
        min-height: 100dvh;
      }
      #app-preboot {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 28% 22%, rgba(15, 125, 96, 0.16), transparent 34%),
          radial-gradient(circle at 76% 70%, rgba(213, 161, 74, 0.18), transparent 32%),
          linear-gradient(145deg, #fffefa 0%, #fff8eb 54%, #f5fff9 100%);
        color: #12362d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        transition:
          opacity 520ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 520ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 520ms cubic-bezier(0.22, 1, 0.36, 1),
          visibility 520ms step-end;
      }
      #app-preboot::before,
      #app-preboot::after {
        content: "";
        position: absolute;
        width: min(58vw, 28rem);
        aspect-ratio: 1;
        border-radius: 999px;
        pointer-events: none;
      }
      #app-preboot::before {
        left: -12vw;
        top: 10vh;
        background: radial-gradient(circle, rgba(5, 117, 89, 0.18), rgba(5, 117, 89, 0));
        animation: app-preboot-aurora-a 5.8s ease-in-out infinite alternate;
      }
      #app-preboot::after {
        right: -14vw;
        bottom: 8vh;
        background: radial-gradient(circle, rgba(219, 164, 70, 0.22), rgba(219, 164, 70, 0));
        animation: app-preboot-aurora-b 6.2s ease-in-out infinite alternate;
      }
      #app-preboot.is-leaving {
        opacity: 0;
        transform: scale(1.018);
        filter: blur(8px);
        visibility: hidden;
        pointer-events: none;
      }
      .app-preboot-card {
        position: relative;
        z-index: 1;
        width: min(82vw, 24rem);
        text-align: center;
      }
      .app-preboot-orbit {
        position: relative;
        display: grid;
        width: 6.75rem;
        height: 6.75rem;
        margin: 0 auto 1.1rem;
        place-items: center;
        border-radius: 999px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 250, 238, 0.72)),
          radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.94), transparent 48%);
        box-shadow:
          0 1.4rem 4rem rgba(10, 80, 61, 0.16),
          inset 0 0 0 1px rgba(206, 161, 82, 0.28);
        animation: app-preboot-float 3.6s ease-in-out infinite;
      }
      .app-preboot-orbit::before {
        content: "";
        position: absolute;
        inset: -0.46rem;
        z-index: -1;
        border-radius: inherit;
        background: conic-gradient(from 120deg, rgba(20, 135, 104, 0.08), rgba(224, 176, 86, 0.84), rgba(255, 255, 255, 0.22), rgba(20, 135, 104, 0.58), rgba(20, 135, 104, 0.08));
        animation: app-preboot-spin 4.8s linear infinite;
      }
      .app-preboot-mark {
        display: grid;
        width: 4.55rem;
        height: 4.55rem;
        place-items: center;
        border-radius: 999px;
        background:
          radial-gradient(circle at 36% 28%, #ffffff 0 18%, transparent 20%),
          linear-gradient(145deg, #0a7055, #0f4e3e 58%, #d8a54d 160%);
        color: #fff7df;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 0;
        box-shadow: inset 0 0 0 1px rgba(255, 244, 205, 0.38);
      }
      .app-preboot-title {
        margin: 0;
        color: #143b31;
        font-size: clamp(1.75rem, 8vw, 2.45rem);
        font-weight: 850;
        letter-spacing: 0;
      }
      .app-preboot-subtitle {
        margin: 0.45rem 0 0;
        color: rgba(20, 59, 49, 0.66);
        font-size: 0.82rem;
        font-weight: 650;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .app-preboot-line {
        position: relative;
        height: 0.28rem;
        margin: 2rem auto 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(13, 104, 80, 0.1);
      }
      .app-preboot-line::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, #0d7e61 18%, #ddb15d 72%, transparent);
        animation: app-preboot-thread 1.45s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      .app-preboot-note {
        margin: 0.8rem 0 0;
        color: rgba(20, 59, 49, 0.52);
        font-size: 0.75rem;
      }
      .preboot-shell {
        min-height: 100dvh;
        background: #fffaf2;
        color: #12362d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }
      .preboot-topbar {
        position: sticky;
        top: 0;
        z-index: 1;
        border-bottom: 1px solid rgba(213, 174, 118, 0.32);
        background: rgba(255, 253, 248, 0.9);
        backdrop-filter: blur(12px);
      }
      .preboot-topbar-inner,
      .preboot-main {
        box-sizing: border-box;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .preboot-topbar-inner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        height: 2.875rem;
        padding-top: 0;
        padding-bottom: 0;
      }
      .preboot-main {
        padding-top: 0.45rem;
        padding-bottom: 5rem;
      }
      .preboot-skeleton {
        position: relative;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(19, 90, 72, 0.1);
      }
      .preboot-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
        animation: preboot-shimmer 1.25s infinite;
      }
      .preboot-logo,
      .preboot-action {
        width: 2.25rem;
        height: 2.25rem;
        flex: 0 0 auto;
      }
      .preboot-search {
        height: 2.375rem;
        flex: 1 1 auto;
      }
      .preboot-hero {
        aspect-ratio: 117 / 50;
        min-height: 8rem;
        max-height: 21rem;
        border-radius: 1rem;
      }
      .preboot-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .preboot-card {
        height: 9rem;
        border-radius: 1rem;
      }
      html[data-preboot-layout="page"] .preboot-main,
      .preboot-shell--page .preboot-main {
        padding-top: 0.75rem;
      }
      html[data-preboot-layout="page"] .preboot-hero,
      .preboot-shell--page .preboot-hero {
        height: 7.75rem;
        aspect-ratio: auto;
        border-radius: 1rem;
      }
      html[data-preboot-layout="page"] .preboot-grid,
      .preboot-shell--page .preboot-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      html[data-preboot-layout="page"] .preboot-card,
      .preboot-shell--page .preboot-card {
        height: 4.35rem;
        border-radius: 0.875rem;
      }
      @keyframes app-preboot-aurora-a {
        to {
          transform: translate3d(7vw, 5vh, 0) scale(1.06);
        }
      }
      @keyframes app-preboot-aurora-b {
        to {
          transform: translate3d(-7vw, -4vh, 0) scale(1.05);
        }
      }
      @keyframes app-preboot-float {
        50% {
          transform: translateY(-0.28rem);
        }
      }
      @keyframes app-preboot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes app-preboot-thread {
        from {
          transform: translateX(-110%);
        }
        to {
          transform: translateX(245%);
        }
      }
      @keyframes preboot-shimmer {
        to {
          transform: translateX(100%);
        }
      }
      @media (min-width: 768px) {
        .preboot-topbar-inner {
          height: 4.25rem;
        }
        .preboot-topbar-inner,
        .preboot-main {
          max-width: 56rem;
          padding-left: 1.5rem;
          padding-right: 1.5rem;
        }
        .preboot-main {
          padding-top: 1rem;
        }
        .preboot-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
        html[data-preboot-layout="page"] .preboot-main,
        .preboot-shell--page .preboot-main {
          max-width: min(1240px, calc(100vw - 3rem));
          padding-top: 1rem;
        }
        html[data-preboot-layout="page"] .preboot-hero,
        .preboot-shell--page .preboot-hero {
          height: 8.25rem;
          aspect-ratio: auto;
        }
        html[data-preboot-layout="page"] .preboot-grid,
        .preboot-shell--page .preboot-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 1024px) {
        .preboot-topbar-inner {
          height: 4.75rem;
        }
        .preboot-topbar-inner,
        .preboot-main {
          max-width: min(1240px, calc(100vw - 4.5rem));
          padding-left: 2rem;
          padding-right: 2rem;
        }
        .preboot-main {
          padding-top: 0;
        }
        html[data-preboot-layout="page"] .preboot-main,
        .preboot-shell--page .preboot-main {
          max-width: min(1240px, calc(100vw - 4.5rem));
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-preboot,
        #app-preboot::before,
        #app-preboot::after,
        .app-preboot-orbit,
        .app-preboot-orbit::before,
        .app-preboot-line::before,
        .preboot-skeleton::after {
          animation: none !important;
        }
        #app-preboot {
          transition-duration: 180ms;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-preboot" aria-busy="true" aria-label="大马通 Silk Aurora 正在启动">
      <div class="app-preboot-card">
        <div class="app-preboot-orbit" aria-hidden="true">
          <div class="app-preboot-mark">马</div>
        </div>
        <h1 class="app-preboot-title">大马通</h1>
        <p class="app-preboot-subtitle">Silk Aurora</p>
        <div class="app-preboot-line" aria-hidden="true"></div>
        <p class="app-preboot-note">南洋丝光启动页</p>
      </div>
    </div>
    <script>
      (function () {
        var preboot = document.getElementById("app-preboot");
        if (!preboot) return;
        var startedAt = Date.now();
        var minVisibleMs = 650;
        var maxVisibleMs = 6000;
        var leaving = false;

        function leave() {
          if (leaving) return;
          leaving = true;
          preboot.classList.add("is-leaving");
          window.setTimeout(function () {
            if (preboot && preboot.parentNode) {
              preboot.parentNode.removeChild(preboot);
            }
          }, 680);
        }

        function requestLeave() {
          var remaining = Math.max(0, minVisibleMs - (Date.now() - startedAt));
          window.setTimeout(leave, remaining);
        }

        window.addEventListener("app:shell-ready", requestLeave, { once: true });
        window.setTimeout(leave, maxVisibleMs);
      })();
    </script>
    <script src="/browser-preboot.js"></script>
    <script type="module">
      try {
        if (typeof import.meta.resolve !== "function") {
          import.meta.resolve = (specifier) => specifier;
        }
      } catch (_) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
