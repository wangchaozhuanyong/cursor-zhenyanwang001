<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#D4AF37" />
    <title>当前离线 - 大马通</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f8f8;
        color: #1f1f1f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .card {
        width: min(92vw, 440px);
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 14px;
        padding: 24px 20px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.6;
        color: #4a4a4a;
        font-size: 14px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        background: #d4af37;
        color: #1f1f1f;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>网络连接不可用</h1>
      <p>当前处于离线状态。你仍可访问部分已缓存页面，但下单、支付、订单与个人数据需要联网。</p>
      <button type="button" onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
