# 正式商城前端（click-send-shop 构建产物）+ 反代 /api → Node gc-api :3001
# 部署路径：/www/wwwroot/cursor-zhenyanwang001/public-frontend
# server_name 请替换为实际公网 IP 或域名

server {
    listen 80;
    listen [::]:80;
    server_name 13.214.165.214;

    root /www/wwwroot/cursor-zhenyanwang001/public-frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/cursor-main-frontend-access.log;
    error_log  /var/log/nginx/cursor-main-frontend-error.log;
}
