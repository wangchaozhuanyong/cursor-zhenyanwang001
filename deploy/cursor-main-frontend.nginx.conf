# 正式商城前端 + 反代 /api → Node gc-api :3001（系统 Nginx，非宝塔）
# 标准部署路径：/var/www/click-send-shop/public-frontend
# 新站点请以 deploy/nginx/site.prod.example.conf 为准；本文件保留历史兼容。
# 当前正式域名：flashcast.com.my / www.flashcast.com.my

server {
    listen 80;
    listen [::]:80;
    server_name flashcast.com.my www.flashcast.com.my;

    # 默认 1m 会导致 Banner/商品图仅数 MB 也被 413；后端视频上限 50MB，建议 60m。
    client_max_body_size 60m;

    root /var/www/click-send-shop/public-frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /offline.html {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/cursor-main-frontend-access.log;
    error_log  /var/log/nginx/cursor-main-frontend-error.log;
}
