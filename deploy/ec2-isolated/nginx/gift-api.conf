# Gift — 后端 API 反向代理（Node 监听 3001）
# 上线前：将 server_name 换成你的 API 域名

server {
    listen 80;
    server_name gift-api.example.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /srv/projects/gift-system/logs/nginx-api-access.log;
    error_log  /srv/projects/gift-system/logs/nginx-api-error.log;
}
