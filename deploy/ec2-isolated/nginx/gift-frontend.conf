# Gift — 前端静态站点
# 上线前：将 server_name 与 root 下的构建产物路径按实际调整（如 dist 子目录）
# 访问日志与错误日志仅写入本项目 logs/

server {
    listen 80;
    server_name gift-frontend.example.com;

    root /srv/projects/gift-system/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /srv/projects/gift-system/logs/nginx-frontend-access.log;
    error_log  /srv/projects/gift-system/logs/nginx-frontend-error.log;
}
