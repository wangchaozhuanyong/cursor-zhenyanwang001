# Renovation — 前端静态站点
# 上线前：将 server_name 换成你的前端域名

server {
    listen 80;
    server_name renovation-frontend.example.com;

    root /srv/projects/renovation-site/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /srv/projects/renovation-site/logs/nginx-frontend-access.log;
    error_log  /srv/projects/renovation-site/logs/nginx-frontend-error.log;
}
