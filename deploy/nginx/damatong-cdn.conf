# Cloudflare-proxied media CDN for S3 public assets.
# Public URL shape: https://cdn.damatong.net/damatong/prod/...
# Legacy fallback remains available at https://cdn.damatong.net/prod/...
server {
    listen 80;
    listen [::]:80;
    server_name cdn.damatong.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    client_max_body_size 1m;
    access_log /var/log/nginx/damatong-cdn-access.log;
    error_log  /var/log/nginx/damatong-cdn-error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = / {
        return 404;
    }

    location ^~ /damatong/prod/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }

        proxy_pass https://damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;
        proxy_http_version 1.1;
        proxy_set_header Host damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;

        proxy_buffering on;
        proxy_cache damatong_media_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 301 302 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Legacy media URLs. Keep this while old cached/client URLs still exist.
    location ^~ /prod/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }

        proxy_pass https://damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;
        proxy_http_version 1.1;
        proxy_set_header Host damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;

        proxy_buffering on;
        proxy_cache damatong_media_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 301 302 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location / {
        return 404;
    }
}
