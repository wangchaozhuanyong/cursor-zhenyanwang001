# 生产 Nginx：damatong.net / www.damatong.net（商城）+ console.damatong.net（管理端）
# 静态：/var/www/damatong/dist、/var/www/damatong/admin-dist
# 安装：bash deploy/nginx/install-damatong-nginx.sh

upstream shop_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# 裸 IP / 未知 Host：统一跳转到正式商城域名（避免 https://IP 证书错误）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.212.179.213 _;
    return 301 https://damatong.net$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 13.212.179.213 _;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    return 301 https://damatong.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name damatong.net www.damatong.net console.damatong.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name damatong.net www.damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    root /var/www/damatong/dist;
    index index.html;
    client_max_body_size 60m;

    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location = /api/admin {
        return 404;
    }

    location ^~ /api/admin/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        proxy_pass http://shop_api/api/pwa/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /apple-touch-icon.png {
        proxy_pass http://shop_api/api/pwa/apple-touch-icon.png;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* ^/pwa-(192x192|512x512|maskable-512x512)\.png$ {
        rewrite ^/pwa-192x192\.png$ /api/pwa/icon-192x192.png break;
        rewrite ^/pwa-512x512\.png$ /api/pwa/icon-512x512.png break;
        rewrite ^/pwa-maskable-512x512\.png$ /api/pwa/icon-maskable-512x512.png break;
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/damatong-storefront-access.log;
    error_log  /var/log/nginx/damatong-storefront-error.log;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    root /var/www/damatong/admin-dist;
    index admin-index.html index.html;
    client_max_body_size 60m;

    location = / {
        return 302 /admin/login;
    }

    location /api/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /admin-index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /admin-index.html;
    }

    access_log /var/log/nginx/damatong-console-access.log;
    error_log  /var/log/nginx/damatong-console-error.log;
}
