# 生产 Nginx：damatong.net / www.damatong.net（商城）+ console.damatong.net（管理端）
# 静态：/var/www/damatong/dist、/var/www/damatong/admin-dist
# 安装：bash deploy/nginx/install-damatong-nginx.sh

upstream shop_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# 裸 IP / 未知 Host：统一跳转到正式商城域名（避免 https://IP 证书错误）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.212.179.213 _;
    return 301 https://damatong.net$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 13.212.179.213 _;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    return 301 https://damatong.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.damatong.net;

    return 301 https://damatong.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name damatong.net console.damatong.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    return 301 https://damatong.net$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    root /var/www/damatong/dist;
    index index.html;
    client_max_body_size 60m;

    location = /admin {
        return 302 https://console.damatong.net$request_uri;
    }

    location ^~ /admin/ {
        return 302 https://console.damatong.net$request_uri;
    }

    location = /api/admin {
        return 404;
    }

    location ^~ /api/admin/ {
        return 404;
    }

    # SEO 入口必须交给 Node 返回动态 HTML/XML，不能落到前端 SPA 的 index.html。
    location = /robots.txt {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sitemap.xml {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = / {
        proxy_pass http://shop_api;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(new-arrivals|categories|help|about|support-download)/?$ {
        proxy_pass http://shop_api;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(product|content)/[^/]+/?$ {
        proxy_pass http://shop_api;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Cloudflare-cached media path. Public URL shape:
    # https://damatong.net/media-cdn/prod/...
    location ^~ /media-cdn/prod/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }

        proxy_pass https://damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com/prod/;
        proxy_http_version 1.1;
        proxy_set_header Host damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_ssl_name damatong-prod-assets-618867225629.s3.ap-southeast-1.amazonaws.com;

        proxy_buffering on;
        proxy_cache damatong_media_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 301 302 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /api/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri =404;
    }

    location ~ ^/(zh|en)/?$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        return 302 /;
    }

    location = /tiktok {
        proxy_pass http://shop_api/tiktok;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /tiktok/ {
        proxy_pass http://shop_api/tiktok;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /manifest.webmanifest {
        proxy_pass http://shop_api/api/pwa/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /apple-touch-icon.png {
        proxy_pass http://shop_api/api/pwa/apple-touch-icon.png;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* ^/pwa-(192x192|512x512|maskable-512x512)\.png$ {
        rewrite ^/pwa-192x192\.png$ /api/pwa/icon-192x192.png break;
        rewrite ^/pwa-512x512\.png$ /api/pwa/icon-512x512.png break;
        rewrite ^/pwa-maskable-512x512\.png$ /api/pwa/icon-maskable-512x512.png break;
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        # SPA 路由（含 "/"）会回落到 index.html，但此处若不显式禁缓存，
        # 浏览器/CDN 可能缓存旧入口 HTML，导致发布后用户一直加载旧构建产物。
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/damatong-storefront-access.log;
    error_log  /var/log/nginx/damatong-storefront-error.log;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.damatong.net;

    ssl_certificate     /etc/letsencrypt/live/damatong.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/damatong.net/privkey.pem;

    root /var/www/damatong/admin-dist;
    index admin-index.html index.html;
    client_max_body_size 60m;

    location = / {
        return 302 /admin/login;
    }

    location /api/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://shop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /admin-index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        # 管理端同样需要避免 "/" 与路由入口 HTML 被缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
        try_files $uri $uri/ /admin-index.html;
    }

    access_log /var/log/nginx/damatong-console-access.log;
    error_log  /var/log/nginx/damatong-console-error.log;
}
