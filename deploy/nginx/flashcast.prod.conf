upstream flashcast_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flashcast.com.my;

    ssl_certificate     /etc/letsencrypt/live/flashcast.com.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flashcast.com.my/privkey.pem;

    root /var/www/flashcast/dist;
    index index.html;
    client_max_body_size 60m;

    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location = /api/admin {
        return 404;
    }

    location ^~ /api/admin/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://flashcast_node;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://flashcast_node;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        proxy_pass http://flashcast_node/api/pwa/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /apple-touch-icon.png {
        proxy_pass http://flashcast_node/api/pwa/apple-touch-icon.png;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* ^/pwa-(192x192|512x512|maskable-512x512)\.png$ {
        rewrite ^/pwa-192x192\.png$ /api/pwa/icon-192x192.png break;
        rewrite ^/pwa-512x512\.png$ /api/pwa/icon-512x512.png break;
        rewrite ^/pwa-maskable-512x512\.png$ /api/pwa/icon-maskable-512x512.png break;
        proxy_pass http://flashcast_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/flashcast-access.log;
    error_log  /var/log/nginx/flashcast-error.log;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.flashcast.com.my;

    ssl_certificate     /etc/letsencrypt/live/console.flashcast.com.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/console.flashcast.com.my/privkey.pem;

    root /var/www/flashcast/admin-dist;
    index admin-index.html index.html;
    client_max_body_size 60m;

    location = / {
        return 302 /admin/login;
    }

    location /api/ {
        proxy_pass http://flashcast_node;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://flashcast_node;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /admin-index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /admin-index.html;
    }

    access_log /var/log/nginx/flashcast-console-access.log;
    error_log  /var/log/nginx/flashcast-console-error.log;
}
