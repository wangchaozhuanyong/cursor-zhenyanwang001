upstream ipshop_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.212.179.213 _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 13.212.179.213 _;

    ssl_certificate     /etc/nginx/ssl/ipshop.crt;
    ssl_certificate_key /etc/nginx/ssl/ipshop.key;

    client_max_body_size 60m;

    root /var/www/damatong/dist;
    index index.html;

    location /api/ {
        proxy_pass http://ipshop_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://ipshop_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /admin/ {
        alias /var/www/damatong/admin-dist/;
        index admin-index.html;
        try_files $uri $uri/ /admin-index.html;
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

