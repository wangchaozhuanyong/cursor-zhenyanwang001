# 已废弃：原 flashcast.com.my / 单域 public-frontend 示例（勿启用）。
# 生产请使用 ../damatong.prod.conf + bash ../install-damatong-nginx.sh

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    client_max_body_size 60m;

    root /var/www/click-send-shop/public-frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3001/api/pwa/manifest.webmanifest;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* ^/pwa-(192x192|512x512|maskable-512x512)\.png$ {
        rewrite ^/pwa-192x192\.png$ /api/pwa/icon-192x192.png break;
        rewrite ^/pwa-512x512\.png$ /api/pwa/icon-512x512.png break;
        rewrite ^/pwa-maskable-512x512\.png$ /api/pwa/icon-maskable-512x512.png break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    location = /apple-touch-icon.png {
        proxy_pass http://127.0.0.1:3001/api/pwa/apple-touch-icon.png;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/pwa/ {
        proxy_pass http://127.0.0.1:3001/api/pwa/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /offline.html {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* ^/workbox-[a-z0-9]+\.js$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/cursor-main-frontend-access.log;
    error_log  /var/log/nginx/cursor-main-frontend-error.log;
}
