# 系统原生 Nginx（apt/yum 安装）站点示例 — 与宝塔面板无关
# 放置：/etc/nginx/sites-available/click-send-shop.conf
# 启用：sudo ln -s /etc/nginx/sites-available/click-send-shop.conf /etc/nginx/sites-enabled/
# 替换：YOUR_DOMAIN、SSL 证书路径、root（静态目录）
#
# 映射关系：
#   /              → 静态前端（Vite dist 或 rsync 后的 public-frontend）
#   /api/          → 反代 Node gc-api :3001
#
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # 若已上 HTTPS，可将 80 仅做重定向：
    # return 301 https://$host$request_uri;

    root /var/www/click-send-shop/public-frontend;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/click-send-shop-access.log;
    error_log  /var/log/nginx/click-send-shop-error.log;
}

