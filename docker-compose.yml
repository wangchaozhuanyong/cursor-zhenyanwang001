# 本地/云主机 MySQL（应用仍在本机或另一容器用 NODE_ENV + 连接串访问）
# 用法：docker compose up -d
# 数据目录：mysql_data 卷

services:
  mysql:
    image: mysql:8.0
    container_name: click-send-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before starting MySQL}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-click_send_shop}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_BIND_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --sync-binlog=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-expire-logs-seconds=604800

volumes:
  mysql_data:
